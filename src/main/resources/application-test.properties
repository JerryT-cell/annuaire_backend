# Test profile — no authentication required for directory, events, subscriptions
# Activate with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=test

spring.application.name=annuaire_backend

# Database (same DB, change if needed)
spring.datasource.url=jdbc:postgresql://localhost:5433/annuaire_db
spring.datasource.username=annuaire_user
spring.datasource.password=secret

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# JWT (still needed for auth endpoints)
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBqd3QgdG9rZW4gZ2VuZXJhdGlvbiBiYW5hZnJhbmNl
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Mail
spring.mail.host=localhost
spring.mail.port=1025

# Scheduling
spring.task.scheduling.pool.size=2

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
